name: SGK Veri Güncelle

# Günlük SGK EK-4/A "Bedeli Ödenecek İlaçlar Listesi" kontrolü.
# Değişiklik varsa sgk-data/ klasörüne yeni JSON commit'lenir.
# Eczacı uygulaması bu JSON'u raw.githubusercontent üzerinden günlük çeker.

on:
  schedule:
    - cron: "0 6 * * *"   # her gün 06:00 UTC (TR 09:00)
  workflow_dispatch:        # elle de tetiklenebilir (Actions sekmesinden)

permissions:
  contents: write           # JSON'u repoya commit edebilmek için
  issues: write             # SUT değişince bildirim Issue'su açmak için

jobs:
  guncelle:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu çek
        uses: actions/checkout@v5

      - name: Node kur
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Bağımlılık (xlsx) kur
        run: npm install xlsx@0.18.5 --no-save

      - name: SGK verisini çek ve parse et
        id: cek
        env:
          # SGK EK-4/A xlsx linki değişirse buraya repo Secret olarak ekle: SGK_EK4A_URL
          SGK_EK4A_URL: ${{ secrets.SGK_EK4A_URL }}
          SGK_INDEX_URL: ${{ secrets.SGK_INDEX_URL }}
          # EK-4/D izleme (değişiklik tespiti için PDF/DOC/sayfa linki). Opsiyonel.
          SGK_EK4D_URL: ${{ secrets.SGK_EK4D_URL }}
        run: node scripts/sgk-veri-cek.mjs

      - name: Değişiklik varsa commit'le
        run: |
          if [ -n "$(git status --porcelain sgk-data/)" ]; then
            git config user.name "sgk-veri-bot"
            git config user.email "bot@users.noreply.github.com"
            git add sgk-data/
            git commit -m "SGK veri güncellemesi: $(date +%Y-%m-%d)"
            git push
            echo "Yeni veri yayımlandı."
          else
            echo "Değişiklik yok."
          fi

      - name: SUT değiştiyse bildirim Issue'su aç
        if: steps.cek.outputs.sut_degisti == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          YENI: ${{ steps.cek.outputs.sut_yeni_tarih }}
          ESKI: ${{ steps.cek.outputs.sut_eski_tarih }}
        run: |
          gh issue create \
            --title "🔔 SGK yeni SUT tebliği yayımladı: $YENI" \
            --body "SGK Sağlık Uygulama Tebliği güncellendi.

          - Önceki sürüm: **$ESKI**
          - Yeni sürüm: **$YENI**
          - Kaynak: https://www.sgk.gov.tr/Duyuru

          **Yapılacaklar:**
          1. Lokal SUT metnini tazele (ZIP indir → Word COM → UTF-8, C:\\sut-guncel).
          2. Eşik/kural değişikliklerini gözden geçir (lipid, enteral, biyolojik vb.).
          3. Uygulamada \`SUT_DOGRULAMA_SURUMU\` değerini \`$YENI\` yap, yeni exe yayımla.

          Bu Issue otomatik açıldı (günlük SUT izleme). İşlem bitince kapat." \
            --assignee berkyildizdas \
          || echo "Issue açılamadı (izin?), workflow loguna bak."
