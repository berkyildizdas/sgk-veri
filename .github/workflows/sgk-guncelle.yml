name: SGK Veri Güncelle

# Günlük SGK EK-4/A "Bedeli Ödenecek İlaçlar Listesi" kontrolü.
# Değişiklik varsa sgk-data/ klasörüne yeni JSON commit'lenir.
# Eczacı uygulaması bu JSON'u raw.githubusercontent üzerinden günlük çeker.

on:
  schedule:
    - cron: "0 6 * * *"   # her gün 06:00 UTC (TR 09:00)
  workflow_dispatch:        # elle de tetiklenebilir (Actions sekmesinden)

permissions:
  contents: write           # JSON'u repoya commit edebilmek için

jobs:
  guncelle:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu çek
        uses: actions/checkout@v4

      - name: Node kur
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Bağımlılık (xlsx) kur
        run: npm install xlsx@0.18.5 --no-save

      - name: SGK verisini çek ve parse et
        env:
          # SGK EK-4/A xlsx linki değişirse buraya repo Secret olarak ekle: SGK_EK4A_URL
          SGK_EK4A_URL: ${{ secrets.SGK_EK4A_URL }}
          SGK_INDEX_URL: ${{ secrets.SGK_INDEX_URL }}
          # EK-4/D izleme (değişiklik tespiti için PDF/DOC/sayfa linki). Opsiyonel.
          SGK_EK4D_URL: ${{ secrets.SGK_EK4D_URL }}
        run: node scripts/sgk-veri-cek.mjs

      - name: Değişiklik varsa commit'le
        run: |
          if [ -n "$(git status --porcelain sgk-data/)" ]; then
            git config user.name "sgk-veri-bot"
            git config user.email "bot@users.noreply.github.com"
            git add sgk-data/
            git commit -m "SGK veri güncellemesi: $(date +%Y-%m-%d)"
            git push
            echo "Yeni veri yayımlandı."
          else
            echo "Değişiklik yok."
          fi
